<!doctype html>
<html lang="ko" class="theme-light">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="theme-color" content="#FAF8F4" media="(prefers-color-scheme: light)" />
    <meta name="theme-color" content="#15140F" media="(prefers-color-scheme: dark)" />
    <script>
      // No-FOUC: 첫 페인트 전에 저장된 테마(zustand persist 'offh.theme') 또는
      // 시스템 선호(prefers-color-scheme)를 즉시 <html> 클래스로 적용한다.
      // AppProviders 의 store→DOM 동기화와 동일한 .theme-light/.theme-dark 규약을 따른다.
      ;(function () {
        try {
          var stored = null
          var raw = localStorage.getItem('offh.theme')
          if (raw) {
            var parsed = JSON.parse(raw)
            var t = parsed && parsed.state && parsed.state.theme
            if (t === 'light' || t === 'dark') stored = t
          }
          var theme =
            stored || (window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light')
          var root = document.documentElement
          root.classList.toggle('theme-dark', theme === 'dark')
          root.classList.toggle('theme-light', theme === 'light')
        } catch (e) {
          /* localStorage/matchMedia 불가 환경은 정적 class="theme-light" 기본값을 유지한다. */
        }
      })()
    </script>
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="apple-touch-icon" href="/icon-192.png" />
    <link rel="manifest" href="/manifest.webmanifest" />
    <link rel="preconnect" href="https://cdn.jsdelivr.net" />
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/variable/pretendardvariable-dynamic-subset.min.css"
    />
    <title>Offhours · 비어 있던 그 시간, 가장 멋진 공간이 됩니다</title>
    <meta

    />
    <link rel="canonical" href="https://offhours-nine.vercel.app/" />

    <!-- Open Graph (Kakao·Facebook·Instagram 등 SNS 공유 미리보기). 라우트별 동적 값은 usePageMeta 가 덮어쓴다. -->

    <meta property="og:title" content="Offhours · 비어 있던 그 시간, 가장 멋진 공간이 됩니다" />

    <meta property="og:type" content="website" />
    <meta property="og:locale" content="ko_KR" />

    <!-- JSON-LD 구조화 데이터 (WebSite·Organization) — 검색엔진에 사이트명·로고·도메인을 알린다.
         공간 상세 등 라우트별 엔티티는 useJsonLd 가 데이터 로드 후 런타임에 주입한다. -->
    <script type="application/ld+json">
      {
        "@context": "https://schema.org",
        "@type": "WebSite",
        "name": "Offhours",
        "url": "https://offhours-nine.vercel.app/",
        "inLanguage": "ko",
        "description": "카페·바·레스토랑의 영업 외 시간을 파티·스몰웨딩·모임·팝업 공간으로. 호스트는 부가 수익, 게스트는 감성 통대관.",
        "publisher": { "@id": "https://offhours-nine.vercel.app/#organization" }
      }
    </script>
    <script type="application/ld+json">
      {
        "@context": "https://schema.org",
        "@type": "Organization",
        "@id": "https://offhours-nine.vercel.app/#organization",
        "name": "Offhours",
        "url": "https://offhours-nine.vercel.app/",
        "logo": "https://offhours-nine.vercel.app/favicon.svg"

    </script>
  </head>
