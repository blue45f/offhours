<!doctype html>
<html lang="ko" class="theme-light">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="theme-color" content="#FAF8F4" media="(prefers-color-scheme: light)" />
    <meta name="theme-color" content="#15140F" media="(prefers-color-scheme: dark)" />
    <script>
      // No-FOUC: 첫 페인트 전에 저장된 테마(zustand persist 'offh.theme') 또는
      // 시스템 선호(prefers-color-scheme)를 즉시 <html> 클래스로 적용한다.
      // AppProviders 의 store→DOM 동기화와 동일한 .theme-light/.theme-dark 규약을 따른다.
      ;(function () {
        try {
          var stored = null
          var raw = localStorage.getItem('offh.theme')
          if (raw) {
            var parsed = JSON.parse(raw)
            var t = parsed && parsed.state && parsed.state.theme
            if (t === 'light' || t === 'dark') stored = t
          }
          var theme =
            stored || (window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light')
          var root = document.documentElement
          root.classList.toggle('theme-dark', theme === 'dark')
          root.classList.toggle('theme-light', theme === 'light')
        } catch (e) {
          /* localStorage/matchMedia 불가 환경은 정적 class="theme-light" 기본값을 유지한다. */
        }
      })()
    </script>
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="preconnect" href="https://cdn.jsdelivr.net" />
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/variable/pretendardvariable-dynamic-subset.min.css"
    />
    <title>Offhours · 비어 있던 그 시간, 가장 멋진 공간이 됩니다</title>
    <meta
      name="description"
      content="카페·바·레스토랑의 영업 외 시간을 파티·스몰웨딩·모임·팝업 공간으로. 호스트는 부가 수익, 게스트는 감성 통대관."
    />
    <meta property="og:title" content="Offhours" />
    <meta
      property="og:description"
      content="영업 외 시간 전문 공간 대여 — 비어 있던 그 시간, 가장 멋진 공간이 됩니다."
    />
    <meta property="og:type" content="website" />
    <meta property="og:locale" content="ko_KR" />
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
