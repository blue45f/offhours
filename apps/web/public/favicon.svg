<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" fill="none">
  <defs>
    <!-- Deep night gradient -->
    <linearGradient id="nightBg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1e1b4b" /> <!-- deep purple-indigo -->
      <stop offset="100%" stop-color="#090514" />
    </linearGradient>
    <!-- Glowing neon amber/gold gradient -->
    <linearGradient id="neonGlow" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#f59e0b" />
      <stop offset="100%" stop-color="#d97706" />
    </linearGradient>
    <filter id="neon" x="-25%" y="-25%" width="150%" height="150%">
      <feDropShadow dx="0" dy="0" stdDeviation="2.5" flood-color="#f59e0b" flood-opacity="0.8" />
    </filter>
  </defs>
  <rect width="64" height="64" rx="18" fill="url(#nightBg)"/>
  <rect x="1.5" y="1.5" width="61" height="61" rx="16.5" stroke="#312e81" stroke-width="2.5"/>
  
  <!-- Crescent moon + cocktail silhouette -->
  <g filter="url(#neon)">
    <!-- Crescent Moon -->
    <path d="M 40 16 A 11 11 0 0 1 24 29 A 10 10 0 0 0 33 15 C 35 15 37.5 15.5 40 16 Z" fill="url(#neonGlow)" stroke="none" opacity="0.3"/>
    <!-- Line work -->
    <path d="M 40 16 A 11 11 0 0 1 24 29" stroke="url(#neonGlow)" stroke-width="3.5" stroke-linecap="round"/>
    <path d="M 21 27 L 35 27 L 28 36 Z" stroke="url(#neonGlow)" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/>
    <path d="M 28 36 L 28 46 M 22 46 L 34 46" stroke="url(#neonGlow)" stroke-width="3" stroke-linecap="round"/>
  </g>
</svg>
