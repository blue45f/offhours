<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630" role="img" aria-label="Offhours — 비어 있던 그 시간, 가장 멋진 공간이 됩니다">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#FAF8F4"/>
      <stop offset="1" stop-color="#F1EDE4"/>
    </linearGradient>
    <radialGradient id="glow" cx="0.82" cy="0.22" r="0.55">
      <stop offset="0" stop-color="#A15E40" stop-opacity="0.18"/>
      <stop offset="1" stop-color="#A15E40" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>
  <rect width="1200" height="630" fill="url(#glow)"/>
  <rect x="0" y="0" width="1200" height="8" fill="#5A6F4F"/>
  <g transform="translate(96, 150)">
    <rect x="0" y="0" width="72" height="72" rx="18" fill="#5A6F4F"/>
    <text x="36" y="49" text-anchor="middle" font-family="Pretendard, 'Apple SD Gothic Neo', sans-serif" font-size="34" font-weight="700" fill="#FAF8F4">오</text>
    <text x="92" y="50" font-family="Pretendard, 'Apple SD Gothic Neo', sans-serif" font-size="34" font-weight="700" fill="#5A6F4F" letter-spacing="1">Offhours</text>
  </g>
  <g transform="translate(96, 290)">
    <text x="0" y="0" font-family="'Nanum Myeongjo', 'Apple SD Gothic Neo', serif" font-size="76" font-weight="700" fill="#2A2620">비어 있던 그 시간,</text>
    <text x="0" y="96" font-family="'Nanum Myeongjo', 'Apple SD Gothic Neo', serif" font-size="76" font-weight="700" fill="#2A2620">가장 멋진 <tspan fill="#A15E40">공간</tspan>이 됩니다</text>
  </g>
  <text x="96" y="520" font-family="Pretendard, 'Apple SD Gothic Neo', sans-serif" font-size="30" fill="#6B655B">카페·바·레스토랑의 영업 외 시간을 파티·스몰웨딩·모임·팝업 공간으로</text>
</svg>
