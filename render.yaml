# Render Blueprint for the Offhours BACKEND (@offhours/api — NestJS 11 + Prisma 7).
#
# This is the backend counterpart to the existing FRONTEND deploy
# (.github/workflows/deploy-vercel-web.yml ships apps/web to Vercel). The web
# SPA lives on Vercel; this blueprint hosts the API on Render and provisions a
# managed PostgreSQL database for it.
#
# HOW TO USE (manual, one-time — Render Blueprints are NOT applied by CI):
#   1. Render dashboard > New > Blueprint, point it at this repo.
#   2. Render reads this file and provisions the web service + the Postgres DB,
#      wiring DATABASE_URL from the database's internal connection string.
#   3. Fill the `sync: false` secrets in the dashboard (JWT_SECRET,
#      JWT_REFRESH_SECRET, TOSS_*). The blueprint deliberately never hard-codes
#      any secret.
#   4. preDeployCommand runs `prisma db push` to sync the schema to the managed
#      Postgres before each deploy (this repo has no migration history — it uses
#      `db push`, not `migrate deploy`; the command is idempotent). To move to
#      `prisma migrate deploy` later, generate a migration history first.
#
# DATABASE NOTE (accurate to THIS repo):
#   apps/api/src/prisma/prisma.service.ts uses Prisma 7 with the @prisma/adapter-pg
#   driver adapter — REAL PostgreSQL. DATABASE_URL is a postgresql:// URL. The data
#   is DURABLE: it lives in the Render managed Postgres database below (a real
#   managed DB, not a SQLite file on a disk), so it survives deploys and restarts.
#
# HEALTH CHECK NOTE: main.ts sets the global prefix to `api` but EXCLUDES `health`
#   (setGlobalPrefix('api', { exclude: ['health'] })), so the liveness route is
#   /health (NOT /api/health). healthCheckPath below matches that.

databases:
  - name: offhours-postgres
    databaseName: offhours
    user: offhours
    plan: basic-256mb # free DBs are time-limited; basic is the smallest durable tier
    region: oregon
    postgresMajorVersion: '16' # match docker-compose.yml (postgres:16-alpine)

services:
  - type: web
    name: offhours-api
    runtime: docker
    # Reuse the multi-stage production Dockerfile (node:22-alpine, non-root,
    # prod-only deps via `pnpm deploy --prod`, CMD `node dist/src/main.js`).
    dockerfilePath: ./apps/api/Dockerfile
    dockerContext: . # build context = repo root (workspace + packages/shared)
    plan: starter
    region: oregon
    branch: main
    autoDeploy: true
    healthCheckPath: /health # HealthController, excluded from the /api prefix
    # Prod image is pruned to prod deps only, so the Prisma CLI (a devDependency)
    # is not present — fetch it on demand to sync the schema. The pruned bundle
    # still ships apps/api/prisma (schema). `db push` because there is no
    # migration history; it is idempotent.
    preDeployCommand: npx -y prisma@7 db push --schema ./prisma/schema.prisma --skip-generate
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 10000 # Render routes external traffic to this port; main.ts reads PORT
      - key: DATABASE_URL
        # Wired automatically from the managed Postgres database above.
        fromDatabase:
          name: offhours-postgres
          property: connectionString
      - key: JWT_SECRET
        sync: false # set a long random secret in the Render dashboard
      - key: JWT_REFRESH_SECRET
        sync: false # separate long random secret for refresh tokens
      - key: JWT_ACCESS_TTL
        value: 15m
      - key: JWT_REFRESH_TTL
        value: 30d
      - key: APP_URL
        # CORS allow-origin read by app.enableCors in main.ts. Set to your Vercel
        # web origin, e.g. https://offhours.vercel.app
        sync: false
      - key: API_URL
        sync: false # public URL of this API service (e.g. https://offhours-api.onrender.com)
      - key: TOSS_CLIENT_KEY
        sync: false # Toss Payments client key (live key in prod)
      - key: TOSS_SECRET_KEY
        sync: false # Toss Payments secret key — NEVER commit
      - key: TOSS_WEBHOOK_SECRET
        sync: false # Toss webhook signature secret
