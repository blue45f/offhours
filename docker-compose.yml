services:
  postgres:
    image: postgres:16-alpine
    container_name: offhours-postgres
    environment:
      POSTGRES_USER: offhours
      POSTGRES_PASSWORD: offhours
      POSTGRES_DB: offhours
    ports:
      - '5432:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U offhours']
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    container_name: offhours-redis
    ports:
      - '6379:6379'

volumes:
  postgres_data:
